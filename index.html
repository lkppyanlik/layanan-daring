<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=https://layanan-publik-daring.web.app/">
<meta name="robots" content="noindex">
<title>Mengalihkan...</title>
<style>
  body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #EEF4FF; }
  .box { text-align: center; padding: 40px; }
  .spinner { width: 36px; height: 36px; border: 3px solid #B4CEFD; border-top-color: #1255A0; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { color: #475569; font-size: 14px; margin: 0 0 12px; }
  a { color: #1255A0; font-weight: 600; font-size: 14px; }
</style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>Mengalihkan ke portal baru...</p>
    <a href="https://layanan-publik-daring.web.app/">Klik di sini jika tidak otomatis dialihkan</a>
  </div>
  <script>window.location.replace("https://layanan-publik-daring.web.app/");</script>
</body>
</html>
